name: Security Scan

on:
  push:
    branches: [ main ]

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Configurar CodeQL
        uses: github/codeql-action/init@v2
        with:
          languages: javascript

      - name: Executar análise
        uses: github/codeql-action/analyze@v2

